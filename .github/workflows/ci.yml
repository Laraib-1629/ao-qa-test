name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:

  syntax-check:
    name: Syntax Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Check JS syntax
        run: |
          files=$(find . -name "*.js" -not -path "./node_modules/*" 2>/dev/null || true)
          if [ -z "$files" ]; then
            echo "No JS files found - skipping"
            exit 0
          fi
          fail=0
          for f in $files; do
            node --check "$f" && echo "ok: $f" || fail=1
          done
          exit $fail

  validate-json:
    name: Validate JSON
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Validate all JSON files
        run: |
          fail=0
          for f in $(find . -name "*.json" -not -path "./node_modules/*" 2>/dev/null || true); do
            node -e "JSON.parse(require('fs').readFileSync('$f','utf8'))" \
              && echo "ok: $f" || { echo "fail: $f"; fail=1; }
          done
          exit $fail

  package-check:
    name: Package Validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Validate package.json fields
        run: |
          if [ ! -f package.json ]; then
            echo "No package.json - skipping"
            exit 0
          fi
          node -e "var pkg=JSON.parse(require('fs').readFileSync('package.json','utf8')); var req=['name','version']; var miss=req.filter(function(k){return !pkg[k]}); if(miss.length){console.error('Missing:',miss.join(', '));process.exit(1);} console.log('ok - name:'+pkg.name+' version:'+pkg.version);"

  check-exports:
    name: Check JS Exports
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify export statements in src/ files
        run: |
          files=$(find src -name "*.js" 2>/dev/null || true)
          if [ -z "$files" ]; then
            echo "No src/ files - skipping"
            exit 0
          fi
          fail=0
          for f in $files; do
            if grep -q "^export" "$f"; then
              echo "ok: $f has exports"
            else
              echo "fail: $f has no export statements"
              fail=1
            fi
          done
          exit $fail

  security-scan:
    name: Secret Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Scan for secrets
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  node-compat:
    name: Node Compat / ${{ matrix.node }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node: ["18", "20", "22"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
      - name: Smoke-test on Node ${{ matrix.node }}
        run: |
          files=$(find . -name "*.js" -not -path "./node_modules/*" 2>/dev/null || true)
          if [ -z "$files" ]; then
            echo "No JS files - skipping"
            exit 0
          fi
          fail=0
          for f in $files; do
            node --check "$f" && echo "ok: $f" || fail=1
          done
          exit $fail
